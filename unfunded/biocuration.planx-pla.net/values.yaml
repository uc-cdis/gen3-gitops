    secretStoreServiceAccount:
      enabled: true
      name: external-secrets
      roleArn: "arn:aws:iam::662843554732:role/gen3_service/unfunded-africa-external-secrets-sa"
    wafv2:
      enabled: true
      wafAclArn: ""
  dev: false
  externalSecrets:
    deploy: true
  postgres:
    dbCreate: true
    externalSecret: "unfunded-aurora-master-password"
  environment: "unfunded"
  hostname: "biocuration.planx-pla.net"
  revproxyArn: "arn:aws:acm:us-east-1:662843554732:certificate/fa13f8ee-5abb-4e0d-89a3-153007d591e0"
