              - name: antimalaria_prophylaxis
                src: antimalaria_prophylaxis
                fn: set
              - name: calc_age_on_day_of_visit
                src: calc_age_on_day_of_visit
                fn: set
              - name: consent_date
                src: consent_date
                fn: set
              - name: consent_file_guid
                src: consent_file_guid
                fn: set
              - name: consent_obtained
                src: consent_obtained
                fn: set
              - name: consent_type
                src: consent_type
                fn: set
              - name: consented_by
                src: consented_by
                fn: set
              - name: date_of_birth
                src: date_of_birth
                fn: set
              - name: date_of_initiation_of_hydr
                src: date_of_initiation_of_hydr
