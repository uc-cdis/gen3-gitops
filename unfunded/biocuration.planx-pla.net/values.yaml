  externalSecrets:
    dbcreds: "unfunded-africa-audit-creds"
    createK8sAuditSecret: true


aws-es-proxy:
  enabled: true
  esEndpoint: "vpc-unfunded-gen3-metadata-2-tf3gyjftzrgm5asaxuvqxxwv2m.us-east-1.es.amazonaws.com"
  externalSecrets:
    awsCreds: "unfunded-africa-aws-es-proxy-creds"

dicom-server:
