    repository: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/guppy
    tag: '2026.02'
  indices:
  - index: etl_mickey
    type: patients
  - index: file_etl_mickey
    type: file
  - index: omop_etl_index_cohortb_20251119
    type: cohort_b_patients
  - index: omop_etl_index_cohorta_20260311
    type: cohort_a_patients
  - index: omop_etl_index_cohortf_20260408
    type: cohort_f_patients
  - index: vpodc_patients
    type: vpodc_patients
hatchery:
  enabled: true
  hatchery:
    sidecarContainer:
      cpu-limit: '0.1'
      memory-limit: 256Mi
      image: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/ecs-ws-sidecar:2026.02
      env:
        NAMESPACE: '{{ .Release.Namespace }}'
        HOSTNAME: '{{ .Values.global.hostname }}'
      args: []
      command:
      - /bin/bash
      - ./sidecar.sh
      lifecycle-pre-stop:
      - su
      - -c
      - echo test
      - -s
      - /bin/sh
      - root
    containers:
    - target-port: 8888
      cpu-limit: '1.0'
      memory-limit: 2Gi
      name: (Tutorials) Example Analysis Jupyter Lab Notebooks
      image: quay.io/cdis/heal-notebooks:combined_tutorials__latest
      env:
        FRAME_ANCESTORS: https://{{ .Values.global.hostname }}
      args:
      - --NotebookApp.base_url=/lw-workspace/proxy/
      - --NotebookApp.default_url=/lab
      - --NotebookApp.password=''
      - --NotebookApp.token=''
      - --NotebookApp.shutdown_no_activity_timeout=5400
      - --NotebookApp.quit_button=False
      command:
      - start-notebook.sh
      path-rewrite: /lw-workspace/proxy/
      use-tls: 'false'
      ready-probe: /lw-workspace/proxy/
      lifecycle-post-start:
      - /bin/sh
      - -c
      - export IAM=`whoami`; rm -rf /home/$IAM/pd/dockerHome; rm -rf /home/$IAM/pd/lost+found; ln -s /data /home/$IAM/pd/; true
      user-uid: 1000
      fs-gid: 100
      user-volume-location: /home/jovyan/pd
      gen3-volume-location: /home/jovyan/.gen3
  image:
    repository: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/hatchery
    tag: 2.7.2
