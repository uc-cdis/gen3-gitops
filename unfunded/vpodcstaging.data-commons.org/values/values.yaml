# Review inferred staging resources before deploy: argo-wrapper buckets, dashboard bucket/IRSA,
# cohort-middleware secret, ohdsi-webapi secret, ssjdispatcher secret, and sower/pelican secret.

global:
  aws:
    enabled: true
    account: '662843554732'
    hatchery_role: arn:aws:iam::662843554732:role/gen3-service/unfunded-vpodc-staging-hatchery-sa
    secretStoreServiceAccount:
      enabled: true
      name: external-secrets
      roleArn: arn:aws:iam::662843554732:role/gen3_service/unfunded-vpodc-staging-external-secrets-sa
    wafv2:
      enabled: true
      wafAclArn: ''
  dev: false
  externalSecrets:
    deploy: true
  postgres:
    dbCreate: true
    externalSecret: unfunded-aurora-master-password
  environment: unfunded
  hostname: vpodc-staging.data-commons.org
  revproxyArn: arn:aws:acm:us-east-1:419939494982:certificate/04695470-5b09-41a9-bccb-f5da3dd0f5a4
  dictionaryUrl: https://s3.amazonaws.com/dictionary-artifacts/datadictionary/develop/schema.json
  portalApp: gitops
  publicDataSets: false
  tierAccessLevel: private
  tierAccessLimit: '100'
  netPolicy:
    enabled: false
  dispatcherJobNum: '10'
  frontendRoot: gen3ff
  ddEnabled: false

