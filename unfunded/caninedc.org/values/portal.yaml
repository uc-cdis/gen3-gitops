portal:
  enabled: true

  serviceAccount:
    annotations: 
      eks.amazonaws.com/role-arn: arn:aws:iam::662843554732:role/unfunded-portal-sa
  portalBuild:
    enabled: true
    rbac:
      enabled: true
    s3csi:
      enabled: true
      pvcName: portal-pvc-canineprod
      pvName: portal-pv-canineprod
      createPV: true
      #volumeHandle: ""
      bucketName: "unfunded-portal-build-bucket"
      mountOptions:
      - allow-delete
      - allow-other
      - region us-east-1
      - sse aws:kms
      - sse-kms-key-id arn:aws:kms:us-east-1:662843554732:key/8d519fe8-e4fd-4519-aad2-2ef6284f0420   
      size: 1Gi
      cache:
        emptyDirSizeLimit: 500Mi
  
    images:
      builder: quay.io/cdis/data-portal:2026.03
      kubectl: bitnami/kubectl:latest
      alpine: alpine:3.20
  
    job:
      lockTtlSeconds: 1800
      ttlSecondsAfterFinished: 600
  
    extraction:
      stripComponents: true

  resources:
    requests:
      memory: 128Mi

      
  replicaCount: 2
  image:
    repository: quay.io/cdis/data-portal
    tag: '2026.04'
  gitops:
    json: |
      {
        "gaTrackingId": "UA-119127212-9",
        "graphql": {
          "boardCounts": [
            {
              "graphql": "_subject_count",
              "name": "Subject",
              "plural": "Subjects"
            },
            {
              "graphql": "_study_count",
              "name": "Study",
              "plural": "Studies"
            },
            {
              "graphql": "_aliquot_count",
              "name": "Aliquot",
              "plural": "Aliquots"
            }
          ],
          "chartCounts": [
            {
              "graphql": "_subject_count",
              "name": "Subject"
            },
            {
              "graphql": "_study_count",
              "name": "Study"
            },
            {
              "graphql": "_aliquot_count",
              "name": "Aliquot"
            }
          ],
          "projectDetails": "boardCounts"
        },
        "components": {
          "appName": "Canine Data Commons",
          "index": {
            "introduction": {
              "heading": "Canine Data Commons",
              "text": "The Canine Data Commons supports the management and sharing of genomics data for the canine research community and aims to accelerate opportunities for discovery and development for the treatment and prevention of canine cancer. The data commons supports cross-project analyses by harmonizing data from different projects through the collaborative development of a data dictionary, providing an API for data queries and download, and providing a cloud-based analysis workspace with rich tools and resources.",
              "link": "/submission"
            },
            "buttons": [
              {
                "name": "Define Data Field",
                "icon": "data-field-define",
                "body": "The Canine Data Commons define the data in a general way. Please study the dictionary before you start browsing.",
                "link": "/DD",
                "label": "Learn more"
              },
              {
                "name": "Explore Data",
                "icon": "data-explore",
                "body": "The Exploration Page gives you insights and a clear overview under selected factors.",
                "link": "/explorer",
                "label": "Explore data"
              },
              {
                "name": "Submit Data",
                "icon": "data-submit",
                "body": "Submit Data based on the dictionary.",
                "link": "/submission",
                "label": "Submit data"
              }
            ]
          },
          "navigation": {
            "items": [
              {
                "icon": "dictionary",
                "link": "/DD",
                "color": "#a2a2a2",
                "name": "Dictionary"
              },
              {
                "icon": "exploration",
                "link": "/explorer",
                "color": "#a2a2a2",
                "name": "Exploration"
              },
              {
                "icon": "files",
                "link": "/files",
                "color": "#a2a2a2",
                "name": "Files"
              },
              {
                "icon": "profile",
                "link": "/identity",
                "color": "#a2a2a2",
                "name": "Profile"
              }
            ]
          },
          "login": {
            "title": "Canine Data Commons",
            "subTitle": "explore share research data",
            "text": "This website shares genomic architecture of modern dog breeds and runs analysis for canine cancer to create clean, easy to navigate visualizations for data-driven discovery for canine cancer.",
            "contact": "If you have any questions about access or the registration process, please contact ",
            "email": "support@gen3.org"
          }
        },
        "featureFlags": {
          "explorer": true,
          "explorerPublic": true
        },
        "dataExplorerConfig": {
          "charts": {
            "project_id": {
              "chartType": "count",
              "title": "Projects"
            },
            "node_id": {
              "chartType": "count",
              "title": "Subjects"
            },
            "breed": {
              "chartType": "bar",
              "title": "Breed"
            },
            "disease_type": {
              "chartType": "bar",
              "title": "Disease Type"
            },
            "data_format": {
              "chartType": "bar",
              "title": "Data Format"
            }
          },
          "filters": {
            "tabs": [
              {
                "title": "Subject",
                "fields":[
                  "project_id",
                  "gender",
                  "breed",
                  "data_format",
                  "data_type"
                ]
              },
              {
                "title": "Diagnosis",
                "fields":[
                  "disease_type",
                  "primary_site"
                ]
              }
            ]
          },
          "table": {
            "enabled": true,
            "fields": [
              "project_id",
              "disease_type",
              "primary_site",
              "breed",
              "gender",
              "data_format",
              "data_type"
            ]
          },
          "buttons": [
            {
              "enabled": true,
              "type": "data",
              "title": "Download All Clinical",
              "leftIcon": "user",
              "rightIcon": "download",
              "fileName": "clinical.json"
            },
            {
              "enabled": true,
              "type": "export-to-pfb",
              "title": "Export to PFB",
              "leftIcon": "datafile",
              "rightIcon": "download"
            }
          ],
          "guppyConfig": {
            "dataType": "subject",
            "nodeCountTitle": "Subjects",
            "fieldMapping": [
            ],
            "manifestMapping": {
              "resourceIndexType": "file",
              "resourceIdField": "object_id",
              "referenceIdFieldInResourceIndex": "subject_id",
              "referenceIdFieldInDataIndex": "subject_id"
            }
          }
        },
        "fileExplorerConfig": {
          "charts": {
            "data_type": {
              "chartType": "stackedBar",
              "title": "File Type"
            },
            "data_format": {
              "chartType": "stackedBar",
              "title": "File Format"
            }
          },
          "filters": {
            "tabs": [
              {
                "title": "File",
                "fields": [
                  "project_id",
                  "data_type",
                  "data_format"
                ],
                "searchFields": [
                  "file_name"
                ]
              }
            ]
          },
          "table": {
            "enabled": true,
            "fields": [
              "project_id",
              "file_name",
              "file_size",
              "object_id"
            ]
          },
          "guppyConfig": {
            "dataType": "file",
            "fieldMapping": [
              {
                "field": "object_id",
                "name": "GUID"
              }
            ],
            "nodeCountTitle": "Files",
            "manifestMapping": {
              "resourceIndexType": "subject",
              "resourceIdField": "subject_id",
              "referenceIdFieldInResourceIndex": "object_id",
              "referenceIdFieldInDataIndex": "object_id"
            },
            "accessibleFieldCheckList": [
              "project_id"
            ],
            "accessibleValidationField": "project_id",
            "downloadAccessor": "object_id"
          },
          "buttons": [
            {
              "enabled": true,
              "type": "file-manifest",
              "title": "Download Manifest",
              "leftIcon": "datafile",
              "rightIcon": "download",
              "fileName": "file-manifest.json",
              "dropdownId": "download"
            },
            {
              "enabled": true,
              "type": "export-files-to-pfb",
              "title": "Export All to PFB",
              "rightIcon": "external-link"
            }
          ],
          "enableLimitedFilePFBExport": {
            "sourceNodeField": "source_node"
          },
          "dropdowns": {}
        },
        "showArboristAuthzOnProfile": true,
        "showFenceAuthzOnProfile": false
      }
