# ExternalName bridge: revproxy nginx resolves ambassador-service.$namespace
# using its built-in ambassador-service.conf location block. Rather than
# patching that conf, we point ambassador-service → workspace-proxy-service
# via ExternalName so the existing nginx config routes correctly without
# requiring Emissary/Ambassador to be installed.
apiVersion: v1
kind: Service
metadata:
  name: ambassador-service
  namespace: {{ .Values.deploymentNamespace }}
  labels:
    app: workspace-proxy
spec:
  type: ExternalName
  externalName: workspace-proxy-service.{{ .Values.deploymentNamespace }}.svc.cluster.local
  ports:
    - name: http
      port: 80
      targetPort: 80
