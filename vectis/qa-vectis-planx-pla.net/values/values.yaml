# ─────────────────────────────────────────────────────────────────────────────
# Workspace services
# ─────────────────────────────────────────────────────────────────────────────

# Workspace Token Service — bridges fence tokens into workspace pods.
wts:
  enabled: true
  image:
    repository: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/workspace-token-service
    tag: '2026.03'
  externalSecrets:
    enabled: true
    secretStore: aws-secrets-manager
    secrets:
      vectis-qa-wts-g3auto: {}
  networkPolicy:
    enabled: true
    ingressNamespaces:
      - vectis-qa-helm
      - jupyter-pods-vectis-qa-helm

# Hatchery — provisions user workspace pods in jupyter-pods-vectis-qa-helm.
hatchery:
  enabled: true
  image:
    repository: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/hatchery
    tag: '2026.03'
  externalSecrets:
    enabled: true
    secretStore: aws-secrets-manager
    secrets:
      vectis-qa-hatchery-g3auto: {}

  hatchery:
    json: |-
      {
        "user-namespace": "jupyter-pods-vectis-qa-helm",
        "sub-dir": "/lw-workspace",
        "user-volume-size": "10Gi",
        "sidecar": {
          "cpu-limit": "1.0",
          "memory-limit": "256Mi",
          "image": "quay.io/cdis/gen3fuse-sidecar:2024.07",
          "env": {
            "NAMESPACE": "vectis-qa-helm",
            "HOSTNAME": "qa-vectis-planx-pla.net"
          },
          "args": [],
          "command": ["/bin/bash", "/sidecar.sh"],
          "lifecycle-pre-stop": ["/bin/bash", "-c", "fusermount -u /data || true"]
        },
        "containers": [
          {
            "target-port": 8888,
            "cpu-limit": "2.0",
            "memory-limit": "4Gi",
            "name": "Jupyter Notebook (Python 3) - Vectis QA",
            "image": "quay.io/cdis/jupyter-superslim:2024.07",
            "env": {
              "FRAME_ANCESTORS": "qa-vectis-planx-pla.net",
              "JUPYTER_GATEWAY_URL": "http://jupyter-enterprise-gateway.jupyter-pods-vectis-qa-helm.svc.cluster.local:8888",
              "JUPYTER_GATEWAY_HTTP_USER": "",
              "JUPYTER_GATEWAY_VALIDATE_CERT": "false"
            },
            "args": [
              "--ServerApp.base_url=/lw-workspace/proxy/",
              "--ServerApp.default_url=/lab",
              "--ServerApp.password=''",
              "--ServerApp.token=''",
              "--ServerApp.ip='*'",
              "--ServerApp.disable_check_xsrf=True",
              "--ServerApp.allow_origin='https://qa-vectis-planx-pla.net'",
              "--ServerApp.root_dir='/home/jovyan'",
              "--ServerApp.shutdown_no_activity_timeout=5400",
              "--ServerApp.quit_button=False"
            ],
            "path-rewrite": "/lw-workspace/proxy/",
            "use-tls": false,
            "ready-probe": "/lw-workspace/proxy/",
            "user-uid": 1000,
            "fs-gid": 100,
            "user-volume-location": "/home/jovyan",
            "gen3-volume-location": "/home/jovyan/.gen3"
          }
        ]
      }

# ─────────────────────────────────────────────────────────────────────────────
# Search (Guppy + ETL + OpenSearch proxy)
# ─────────────────────────────────────────────────────────────────────────────

# Reverse-proxy to AWS OpenSearch (avoids public exposure of OpenSearch endpoint).
aws-es-proxy:
  enabled: true
  image:
    repository: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/aws-es-proxy
    tag: '2026.03'
  esEndpoint: "https://PLACEHOLDER_OPENSEARCH_ENDPOINT"

guppy:
  enabled: true
  image:
    repository: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/guppy
    tag: '2026.03'
  esEndpoint: "http://aws-es-proxy-service.vectis-qa-helm.svc.cluster.local:9200"
  # Index names follow the convention <environment>_<type>.
  indices:
    - index: vectis-qa_subject
      type: subject
    - index: vectis-qa_file
      type: file
  configIndex: vectis-qa_array-config
  authFilterField: auth_resource_path
  tierAccessLevel: libre

etl:
  enabled: true
  image:
    repository: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/tube
    tag: '2026.03'
  esEndpoint: "http://aws-es-proxy-service.vectis-qa-helm.svc.cluster.local:9200"
  externalSecrets:
    enabled: true
    secretStore: aws-secrets-manager
    secrets:
      vectis-qa-etl-g3auto: {}
