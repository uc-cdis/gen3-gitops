    tag: '2026.03'
  externalSecrets:
    enabled: true
    secretStore: aws-secrets-manager
    secrets:
      vectis-qa-peregrine-g3auto: {}

metadata:
  enabled: true
  image:
    repository: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/metadata-service
    tag: '2026.03'
  externalSecrets:
    enabled: true
    secretStore: aws-secrets-manager
    secrets:
      vectis-qa-metadata-g3auto: {}

requestor:
  enabled: true
  image:
    repository: 707767160287.dkr.ecr.us-east-1.amazonaws.com/gen3/requestor
    tag: '2026.03'
  externalSecrets:
    enabled: true
    secretStore: aws-secrets-manager
    secrets:
